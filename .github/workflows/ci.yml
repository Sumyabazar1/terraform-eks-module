name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # for checkov PR comments

jobs:

  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (module)
        run: terraform init -backend=false
        working-directory: modules/eks

      - name: terraform validate (module)
        run: terraform validate
        working-directory: modules/eks

      - name: terraform init (example)
        run: terraform init -backend=false
        working-directory: examples/basic

      - name: terraform validate (example)
        run: terraform validate
        working-directory: examples/basic

  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: modules/eks
          format: sarif
          soft_fail: false

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif

  checkov:
    name: Checkov Policy Check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/eks
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false
          # Skip checks that conflict with our explicit design choices
          skip_check: >-
            CKV_AWS_58,
            CKV_AWS_79

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

  docs:
    name: Check terraform-docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: terraform-docs
        uses: terraform-docs/gh-actions@v1.3.0
        with:
          working-dir: modules/eks
          output-file: README.md
          output-method: inject
          fail-on-diff: true
